services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: campventory-app
    container_name: campventory-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - campventory-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: campventory-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - campventory-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: campventory-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: campventory
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: campventory_user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - campventory-network

networks:
  campventory-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
